<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Stripe — Software Engineer (Greenhouse fixture)</title>
  </head>
  <body>
    <h1 id="app_title">Apply for Software Engineer</h1>
    <form id="application-form" action="/apply">
      <div class="field">
        <label for="first_name">First Name *</label>
        <input id="first_name" name="first_name" type="text" />
      </div>
      <div class="field">
        <label for="last_name">Last Name *</label>
        <input id="last_name" name="last_name" type="text" />
      </div>
      <div class="field">
        <label for="email">Email *</label>
        <input id="email" name="email" type="email" />
      </div>
      <div class="field">
        <label for="phone">Phone *</label>
        <input id="phone" name="phone" type="tel" />
      </div>

      <div class="field" id="resume_fields">
        <label for="resume">Resume / CV *</label>
        <input id="resume" name="resume" type="file" accept=".pdf,.doc,.docx" />
      </div>

      <div class="field">
        <label for="job_application_answers_attributes_0_text_value">
          LinkedIn Profile
        </label>
        <input
          id="job_application_answers_attributes_0_text_value"
          name="job_application[answers_attributes][0][text_value]"
          type="url"
        />
      </div>

      <div class="field">
        <label for="job_application_answers_attributes_1_text_value">
          GitHub
        </label>
        <input
          id="job_application_answers_attributes_1_text_value"
          name="job_application[answers_attributes][1][text_value]"
          type="url"
        />
      </div>

      <fieldset class="field">
        <legend>Are you authorized to work in the US?</legend>
        <label><input type="radio" name="work_auth" value="Yes" /> Yes</label>
        <label><input type="radio" name="work_auth" value="No" /> No</label>
      </fieldset>

      <button type="submit">Submit Application</button>
    </form>
  </body>
</html>
