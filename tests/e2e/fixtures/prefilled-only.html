<!doctype html>
<html>
  <head><meta charset="utf-8" /><title>Pre-filled application</title></head>
  <body>
    <!-- A real form whose fields are ALL already filled. detectFields still
         returns candidates (>0), so this is a normal "all pre-filled"
         completion, NOT the no-form case — it must not trigger the message. -->
    <form id="application-form">
      <label>First name <input type="text" name="first_name" value="Ada" /></label>
      <label>Last name <input type="text" name="last_name" value="Lovelace" /></label>
      <label>Email <input type="email" name="email" value="ada@example.com" /></label>
    </form>
  </body>
</html>
