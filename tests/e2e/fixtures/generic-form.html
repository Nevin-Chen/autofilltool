<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Generic Application Form (fixture)</title>
  </head>
  <body>
    <h1>Application</h1>
    <form id="app">
      <p>
        <label for="first">First name</label>
        <input id="first" name="first_name" type="text" autocomplete="given-name" />
      </p>
      <p>
        <label for="last">Last name</label>
        <input id="last" name="last_name" type="text" autocomplete="family-name" />
      </p>
      <p>
        <label for="email">Email address</label>
        <input id="email" name="email" type="email" />
      </p>
      <p>
        <label for="phone">Mobile phone</label>
        <input id="phone" name="phone" type="tel" />
      </p>
      <p>
        <label for="street">Street address</label>
        <input id="street" name="address1" type="text" autocomplete="address-line1" />
      </p>
      <p>
        <label for="city">City</label>
        <input id="city" name="city" type="text" />
      </p>
      <p>
        <label for="state">State / Province</label>
        <input id="state" name="state" type="text" />
      </p>
      <p>
        <label for="zip">Postal Code</label>
        <input id="zip" name="postal_code" type="text" />
      </p>
      <p>
        <label for="country">Country</label>
        <select id="country" name="country">
          <option value="">— select —</option>
          <option value="US">United States</option>
          <option value="CA">Canada</option>
          <option value="GB">United Kingdom</option>
        </select>
      </p>
      <p>
        <label for="linkedin">LinkedIn profile</label>
        <input id="linkedin" name="linkedin_url" type="url" />
      </p>
      <p>
        <label for="github">GitHub</label>
        <input id="github" name="github_url" type="url" />
      </p>
      <p>
        <label for="portfolio">Personal website / portfolio</label>
        <input id="portfolio" name="portfolio_url" type="url" />
      </p>

      <fieldset>
        <legend>Are you authorized to work in the US?</legend>
        <label><input type="radio" name="work_auth" value="yes" /> Yes</label>
        <label><input type="radio" name="work_auth" value="no" /> No</label>
      </fieldset>

      <fieldset>
        <legend>Do you require sponsorship?</legend>
        <label><input type="radio" name="sponsorship_required" value="yes" /> Yes</label>
        <label><input type="radio" name="sponsorship_required" value="no" /> No</label>
      </fieldset>

      <p>
        <label for="cover">Cover letter</label>
        <textarea id="cover" name="cover_letter" rows="6"></textarea>
      </p>

      <p>
        <label for="why">Why do you want to work here?</label>
        <textarea id="why" name="why_us" rows="6"></textarea>
      </p>

      <p>
        <button type="submit">Submit application</button>
      </p>
    </form>
  </body>
</html>
