<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Globex — Staff Engineer (Ashby fixture)</title>
  </head>
  <body>
    <div id="ashby-job-posting-form">
      <form>
        <div data-testid="FieldEntry">
          <div data-testid="FieldLabel">Full name</div>
          <input data-testid="InputField" name="_systemfield_name" type="text" />
        </div>
        <div data-testid="FieldEntry">
          <div data-testid="FieldLabel">Email</div>
          <input data-testid="InputField" name="_systemfield_email" type="email" />
        </div>
        <div data-testid="FieldEntry">
          <div data-testid="FieldLabel">Phone</div>
          <input data-testid="InputField" name="_systemfield_phone" type="tel" />
        </div>
        <div data-testid="FieldEntry">
          <div data-testid="FieldLabel">Resume</div>
          <input type="file" accept=".pdf,.doc,.docx,.txt" />
        </div>
        <div data-testid="FieldEntry">
          <div data-testid="FieldLabel">LinkedIn</div>
          <input data-testid="InputField" name="_systemfield_linkedin" type="url" />
        </div>
        <div data-testid="FieldEntry">
          <div data-testid="FieldLabel">GitHub</div>
          <input name="_systemfield_github" type="url" />
        </div>
        <div data-testid="FieldEntry">
          <div data-testid="FieldLabel">Why do you want to work at Globex?</div>
          <textarea data-testid="MultilineInput" name="customfield_why"></textarea>
        </div>
        <button type="submit">Submit application</button>
      </form>
    </div>
  </body>
</html>
